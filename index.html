<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情劫命格 · 天命占卜</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07071a;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --gold: #c9a84c;
    --gold2: #f0d080;
    --purple: #9b6ef3;
    --purple2: #c4a0ff;
    --red: #e05c7a;
    --text: #e8dfc8;
    --text-dim: rgba(232,223,200,0.55);
    --border: rgba(201,168,76,0.18);
    --glow: rgba(201,168,76,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Stars canvas ── */
  #stars-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Nebula blobs ── */
  .nebula {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.13;
    pointer-events: none;
    z-index: 0;
  }
  .nebula-1 { width: 500px; height: 500px; background: var(--purple); top: -120px; right: -100px; }
  .nebula-2 { width: 400px; height: 400px; background: var(--red);    bottom: -80px; left: -100px; }
  .nebula-3 { width: 300px; height: 300px; background: var(--gold);   top: 40%; left: 50%; transform: translate(-50%,-50%); opacity: 0.07; }

  /* ── App wrapper ── */
  #app {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* ══ INTRO ══ */
  #screen-intro {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    gap: 0;
  }

  .symbol-ring {
    width: 140px;
    height: 140px;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    position: relative;
    margin-bottom: 36px;
    animation: spin-slow 30s linear infinite;
  }
  .symbol-ring::before {
    content: '';
    position: absolute;
    inset: 12px;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 50%;
  }
  .symbol-ring::after {
    content: '☽';
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    animation: spin-slow 30s linear infinite reverse;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(201,168,76,0.7);
  }

  .dot-ring {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
  }
  .dot {
    position: absolute;
    width: 5px;
    height: 5px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--gold);
  }

  @keyframes spin-slow { to { transform: rotate(360deg); } }

  .intro-eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 14px;
    opacity: 0.8;
  }

  .intro-title {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(38px, 9vw, 52px);
    color: var(--gold2);
    text-shadow: 0 0 40px rgba(240,208,128,0.4), 0 0 80px rgba(201,168,76,0.2);
    line-height: 1.15;
    margin-bottom: 8px;
  }

  .intro-sub {
    font-size: 13px;
    letter-spacing: 6px;
    color: var(--text-dim);
    margin-bottom: 32px;
  }

  .intro-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto 32px;
  }

  .intro-desc {
    font-size: 13.5px;
    line-height: 2;
    color: var(--text-dim);
    max-width: 340px;
    margin-bottom: 48px;
  }

  .intro-ornaments {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--gold);
    font-size: 18px;
    margin-bottom: 10px;
    opacity: 0.5;
  }

  /* ── Buttons ── */
  .btn-start {
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(155,110,243,0.12));
    border: 1px solid var(--gold);
    color: var(--gold2);
    font-family: 'Noto Serif SC', serif;
    font-size: 15px;
    letter-spacing: 3px;
    padding: 16px 52px;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s;
    text-shadow: 0 0 20px rgba(240,208,128,0.5);
  }
  .btn-start::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.25), rgba(155,110,243,0.2));
    opacity: 0;
    transition: opacity 0.4s;
  }
  .btn-start:hover::before { opacity: 1; }
  .btn-start:hover {
    box-shadow: 0 0 30px rgba(201,168,76,0.3), 0 0 60px rgba(201,168,76,0.1);
    transform: translateY(-1px);
  }
  .btn-start:active { transform: translateY(0); }

  /* ══ QUIZ ══ */
  #screen-quiz { padding-top: 40px; }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }

  .quiz-counter {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-dim);
  }

  .quiz-counter span {
    color: var(--gold);
    font-size: 18px;
    font-weight: 600;
  }

  .progress-track {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.08);
    margin: 0 16px;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--purple), var(--gold));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px var(--gold);
  }

  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
    animation: card-in 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-num {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--purple2);
    margin-bottom: 14px;
    opacity: 0.7;
  }

  .question-text {
    font-size: 16px;
    line-height: 1.85;
    color: var(--text);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    font-size: 13.5px;
    line-height: 1.7;
    padding: 14px 18px;
    border-radius: 2px;
    cursor: pointer;
    text-align: left;
    transition: all 0.25s;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .option-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), rgba(155,110,243,0.08));
    opacity: 0;
    transition: opacity 0.25s;
  }
  .option-btn:hover {
    border-color: rgba(201,168,76,0.4);
    transform: translateX(4px);
    box-shadow: -2px 0 0 var(--gold), 0 4px 20px rgba(0,0,0,0.3);
  }
  .option-btn:hover::after { opacity: 1; }
  .option-btn.selected {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    box-shadow: -3px 0 0 var(--gold), 0 0 20px rgba(201,168,76,0.15);
  }
  .option-btn.selected::after { opacity: 1; }

  .option-label {
    width: 22px;
    height: 22px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    color: var(--gold);
    margin-top: 1px;
    transition: all 0.25s;
  }
  .option-btn:hover .option-label,
  .option-btn.selected .option-label {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }

  .nav-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .btn-next {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 10px 28px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s;
    opacity: 0;
    pointer-events: none;
  }
  .btn-next.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .btn-next:hover {
    background: rgba(201,168,76,0.1);
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  /* ══ LOADING ══ */
  #screen-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    gap: 24px;
  }

  .loading-ring {
    width: 80px;
    height: 80px;
    border: 2px solid rgba(201,168,76,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--text-dim);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

  /* ══ RESULT ══ */
  #screen-result {
    padding-top: 50px;
    animation: fade-in 0.8s ease;
  }
  @keyframes fade-in { from{opacity:0} to{opacity:1} }

  .result-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .result-eyebrow {
    font-size: 10px;
    letter-spacing: 5px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 16px;
  }

  .result-fate-name {
    font-family: 'Ma Shan Zheng', serif;
    font-size: clamp(30px, 8vw, 44px);
    color: var(--gold2);
    text-shadow: 0 0 40px rgba(240,208,128,0.5), 0 0 80px rgba(201,168,76,0.25);
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .result-type-tag {
    display: inline-block;
    background: rgba(155,110,243,0.15);
    border: 1px solid rgba(155,110,243,0.4);
    color: var(--purple2);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 5px 16px;
    border-radius: 20px;
    margin-bottom: 24px;
  }

  .glow-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 24px 0;
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .result-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .result-card-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 14px;
  }

  .result-desc {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
  }

  .secondary-fate {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 8px;
  }

  .secondary-tag {
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    color: var(--gold);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 2px;
  }

  .chart-container {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-width: 360px;
    margin: 0 auto;
    padding: 10px;
  }

  .oracle-box {
    background: linear-gradient(135deg, rgba(155,110,243,0.08), rgba(201,168,76,0.05));
    border: 1px solid rgba(155,110,243,0.25);
    border-radius: 4px;
    padding: 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .oracle-box::before {
    content: '✦';
    position: absolute;
    top: 12px; left: 20px;
    color: var(--purple);
    opacity: 0.4;
    font-size: 14px;
  }
  .oracle-box::after {
    content: '✦';
    position: absolute;
    bottom: 12px; right: 20px;
    color: var(--gold);
    opacity: 0.4;
    font-size: 14px;
  }

  .oracle-text {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 16px;
    line-height: 2;
    color: var(--purple2);
    text-shadow: 0 0 20px rgba(196,160,255,0.3);
  }

  .btn-restart {
    display: block;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Noto Serif SC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 14px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 30px;
    text-align: center;
  }
  .btn-restart:hover {
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
  }

  .screen { display: none; }
  .screen.active { display: block; }
  #screen-intro.active { display: flex; }
  #screen-loading.active { display: flex; }

  .stars-shimmer {
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%,100%{opacity:0.6} 50%{opacity:1}
  }
</style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div id="app">

  <!-- ── INTRO ── -->
  <div id="screen-intro" class="screen active">
    <div class="symbol-ring">
      <div class="dot-ring" id="dot-ring"></div>
    </div>
    <div class="intro-eyebrow">紫微命理 · 玄学占卜</div>
    <div class="intro-title">情劫命格<br>天命测算</div>
    <div class="intro-sub">· FATE OF LOVE ·</div>
    <div class="intro-divider"></div>
    <div class="intro-desc">
      你与情爱之间，究竟有怎样的命定羁绊？<br>
      是执念深种，还是宿命纠缠？<br>
      是破而后立，还是过度付出？<br><br>
      答完 28 道题，星盘将为你揭示<br>今生注定的情劫命格。
    </div>
    <div class="intro-ornaments">✦ &nbsp; ✧ &nbsp; ★ &nbsp; ✧ &nbsp; ✦</div>
    <br>
    <button class="btn-start" onclick="startQuiz()">开启星盘测算</button>
  </div>

  <!-- ── QUIZ ── -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <div class="quiz-counter"><span id="q-current">1</span> / 28</div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div style="font-size:11px;letter-spacing:1px;color:var(--text-dim)">命格</div>
    </div>
    <div class="question-card" id="question-card">
      <div class="question-num" id="question-num">QUESTION 01</div>
      <div class="question-text" id="question-text"></div>
      <div class="options-grid" id="options-grid"></div>
    </div>
    <div class="nav-row">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">继续 →</button>
    </div>
  </div>

  <!-- ── LOADING ── -->
  <div id="screen-loading" class="screen">
    <div class="loading-ring"></div>
    <div class="loading-text">星盘运算中 · · ·</div>
  </div>

  <!-- ── RESULT ── -->
  <div id="screen-result" class="screen">
    <div class="result-header">
      <div class="result-eyebrow">⋆ 你的情劫命格 ⋆</div>
      <div class="result-fate-name" id="result-name">—</div>
      <div class="result-type-tag" id="result-tag">—</div>
    </div>

    <div class="result-card">
      <div class="result-card-title">▸ 命格解析</div>
      <div class="result-desc" id="result-desc">—</div>
    </div>

    <div class="result-card" id="secondary-card" style="display:none">
      <div class="result-card-title">▸ 次要命格</div>
      <div class="secondary-fate" id="secondary-fates"></div>
    </div>

    <div class="result-card">
      <div class="result-card-title">▸ 命格星盘分布</div>
      <div class="chart-container">
        <canvas id="fate-chart"></canvas>
      </div>
    </div>

    <div class="oracle-box">
      <div class="oracle-text" id="oracle-text">—</div>
    </div>

    <button class="btn-restart" onclick="restart()">✦ &nbsp; 重新测算 &nbsp; ✦</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  STAR BACKGROUND
// ══════════════════════════════════════════
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    stars = [];
    const n = Math.floor((canvas.width * canvas.height) / 3500);
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.3 + 0.2,
        o: Math.random() * 0.7 + 0.15,
        speed: Math.random() * 0.5 + 0.1,
        phase: Math.random() * Math.PI * 2,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    stars.forEach(s => {
      const alpha = s.o * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,245,210,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();

  // Dot ring for intro
  const dotRing = document.getElementById('dot-ring');
  if (dotRing) {
    for (let i = 0; i < 12; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      const angle = (i / 12) * Math.PI * 2;
      const r = 70;
      dot.style.left = (88 + r * Math.cos(angle)) + 'px';
      dot.style.top  = (88 + r * Math.sin(angle)) + 'px';
      dot.style.opacity = i % 3 === 0 ? '1' : '0.35';
      dotRing.appendChild(dot);
    }
  }
})();

// ══════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════
const FATES = {
  HL: { name: '红鸾情劫型', short: '情根深种，为情所困', color: 'rgba(224,92,122,0.8)' },
  TL: { name: '贪狼情劫型', short: '欲望漩涡，人际纠葛', color: 'rgba(155,110,243,0.8)' },
  PJ: { name: '破军情劫型', short: '动荡剧烈，破而后立', color: 'rgba(99,179,237,0.8)' },
  TT: { name: '天同情劫型', short: '过度付出，滋养他人', color: 'rgba(72,187,120,0.8)' },
  TY: { name: '太阴情劫型', short: '情绪共情，抑郁内耗', color: 'rgba(196,160,255,0.8)' },
  WQ: { name: '武曲化忌型', short: '现实压力型感情',     color: 'rgba(237,175,90,0.8)' },

// Shuffle array
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

//  STATE
// ══════════════════════════════════════════
let questions = [];
let current = 0;
let selected = null;
let scores = { HL:0, TL:0, PJ:0, TT:0, TY:0, WQ:0 };
let chartInstance = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  questions = shuffle(RAW_QUESTIONS).map(q => ({
    ...q,
    opts: shuffle(q.opts)
  }));
  scores = { HL:0, TL:0, PJ:0, TT:0, TY:0, WQ:0 };
  current = 0;
  selected = null;
  show('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById('q-current').textContent = current + 1;
  document.getElementById('question-num').textContent = 'QUESTION ' + String(current+1).padStart(2,'0');
  document.getElementById('question-text').textContent = q.q;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';
  const labels = ['甲','乙','丙','丁'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-label">${labels[i]}</span><span>${opt.t}</span>`;
    btn.onclick = () => selectOption(i, btn);
    grid.appendChild(btn);
  });

  const fill = document.getElementById('progress-fill');
  fill.style.width = (current / questions.length * 100) + '%';

  const nextBtn = document.getElementById('btn-next');
  nextBtn.classList.remove('visible');
  selected = null;

  // Animate card
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'card-in 0.5s cubic-bezier(0.4,0,0.2,1)';
}

function selectOption(idx, btn) {
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selected = idx;
  document.getElementById('btn-next').classList.add('visible');
}

function nextQuestion() {
  if (selected === null) return;
  const q = questions[current];
  const opt = q.opts[selected];
  Object.entries(opt.s).forEach(([k,v]) => { scores[k] = (scores[k]||0) + v; });

  current++;
  if (current >= questions.length) {
    showLoading();
  } else {
    renderQuestion();
  }
}

function showLoading() {
  show('screen-loading');
  setTimeout(showResult, 2200);
}

function showResult() {
  show('screen-result');

  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const [topKey, topScore] = sorted[0];
  const fate = FATES[topKey];

  document.getElementById('result-name').textContent = fate.name;
  document.getElementById('result-tag').textContent = fate.short;
  document.getElementById('result-desc').textContent = FATE_DESC[topKey];
  document.getElementById('oracle-text').textContent = FATE_ORACLE[topKey];

  // Secondary fates
  const secondaryCard = document.getElementById('secondary-card');
  const secondaryFates = document.getElementById('secondary-fates');
  secondaryFates.innerHTML = '';
  const threshold = topScore * 0.75;
  const secondaries = sorted.slice(1).filter(([,v]) => v >= threshold);
  if (secondaries.length > 0) {
    secondaryCard.style.display = 'block';
    secondaries.forEach(([k]) => {
      const tag = document.createElement('div');
      tag.className = 'secondary-tag';
      tag.textContent = FATES[k].name;
      secondaryFates.appendChild(tag);
    });
  } else {
    secondaryCard.style.display = 'none';
  }

  renderChart(sorted, topKey);
}

function renderChart(sorted, topKey) {
  if (chartInstance) { chartInstance.destroy(); }

  const labels = Object.keys(FATES).map(k => FATES[k].name.replace('情劫型','').replace('化忌型','').replace('囚星型',''));
  const data   = Object.keys(FATES).map(k => scores[k] || 0);
  const colors = Object.keys(FATES).map(k => FATES[k].color);
  const borderColors = colors.map(c => c.replace('0.8)','1)'));

  const ctx = document.getElementById('fate-chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'radar',
    data: {
      labels,
      datasets: [{
        label: '命格能量',
        data,
        backgroundColor: 'rgba(201,168,76,0.08)',
        borderColor: 'rgba(201,168,76,0.7)',
        pointBackgroundColor: borderColors,
        pointBorderColor: borderColors,
        pointRadius: 5,
        pointHoverRadius: 7,
        borderWidth: 1.5,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,15,26,0.95)',
          borderColor: 'rgba(201,168,76,0.3)',
          borderWidth: 1,
          titleColor: '#c9a84c',
          bodyColor: '#e8dfc8',
          callbacks: {
            label: ctx => `  ${ctx.raw} 分`
          }
        }
      },
      scales: {
        r: {
          min: 0,
          grid: { color: 'rgba(255,255,255,0.07)' },
          angleLines: { color: 'rgba(201,168,76,0.12)' },
          ticks: {
            display: false,
            stepSize: 2,
          },
          pointLabels: {
            color: 'rgba(232,223,200,0.7)',
            font: { size: 10, family: 'Noto Serif SC' },
          }
        }
      }
    }
  });
}

function restart() {
  show('screen-intro');
}
</script>
</body>
</html>
